ll:
  services:
    diff_drive:
      wheel_distance_m: 0.45
      ticks_per_m: 1195.0
    gps:
      protocol: "NMEA"
      baudrate: 921600
    imu:
      axis_config: "+Z+X+Y"
      disable_collision_detection: false
      collision_accel_threshold: 12.0
      collision_gyro_threshold: 2.5
      collision_jerk_threshold: 250.0
      collision_gravity_filter_hz: 1.5
      collision_wheel_current_threshold: 4.0
      collision_actual_linear_speed_threshold: 0.08
      collision_actual_angular_speed_threshold: 0.5
      collision_actual_speed_drop_threshold: 0.2
      collision_consecutive_samples: 2
    power:
      battery_empty_voltage: 23.5
      battery_critical_voltage: 22.5
      battery_full_voltage: 28.5
      battery_critical_high_voltage: 29.0
      charge_critical_high_voltage: 38.0
      charge_critical_high_current: 3.9
      charge_current: 2.5
    input:
      config_file: /opt/open_mower_ros/src/open_mower/params/hardware_specific/Sabo/inputs.yaml

xbot_positioning:
  antenna_offset_x: 0.18
  antenna_offset_y: 0.0

mower_logic:
  tool_width: 0.28
