TEBPlanner:
  odom_topic: /xbot_positioning/odom_out
  map_frame: map

  teb_autosize: true
  dt_ref: 0.3
  dt_hysteresis: 0.1
  max_global_plan_lookahead_dist: 2.0
  global_plan_viapoint_sep: 0.3
  feasibility_check_no_poses: 4

  max_vel_x: 0.35
  max_vel_x_backwards: 0.1
  max_vel_theta: 0.9
  acc_lim_x: 0.2
  acc_lim_theta: 0.8
  min_turning_radius: 0.0

  xy_goal_tolerance: 0.08
  yaw_goal_tolerance: 0.2
  free_goal_vel: false
  complete_global_plan: false

  weight_max_vel_x: 2.0
  weight_max_vel_theta: 1.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 1000.0
  weight_optimaltime: 2.0
  weight_obstacle: 50.0
  weight_inflation: 0.2

  min_obstacle_dist: 0.02
  inflation_dist: 0.1
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 0.5
  obstacle_poses_affected: 20

  footprint_model:
    type: circular
    radius: 0.28
