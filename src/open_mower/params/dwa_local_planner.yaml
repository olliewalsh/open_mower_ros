DWAPlanner:
  max_vel_x: 0.35
  min_vel_x: 0.0
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.35
  min_vel_trans: 0.05
  max_vel_theta: 0.9
  min_vel_theta: 0.2
  acc_lim_x: 0.2
  acc_lim_y: 0.0
  acc_lim_theta: 0.8

  yaw_goal_tolerance: 0.2
  xy_goal_tolerance: 0.08
  latch_xy_goal_tolerance: false

  sim_time: 1.2
  sim_granularity: 0.05
  angular_sim_granularity: 0.1
  vx_samples: 12
  vy_samples: 0
  vth_samples: 20
  controller_frequency: 5.0

  path_distance_bias: 64.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05
  forward_point_distance: 0.15
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  oscillation_reset_dist: 0.1
  prune_plan: true
